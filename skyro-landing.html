<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyroCredit — landing preview</title>
<style>
.land-stage{
  --line:#26262A; --faint:#5C5C61; --text:#F2F2F0;
  background:#0A0A0B; min-height:100%;
  display:flex; align-items:center; justify-content:center;
  padding:48px 20px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
.land-stage *{box-sizing:border-box;}
.land-devices{display:flex; align-items:flex-start; justify-content:center; gap:48px; flex-wrap:nowrap;}
.land-dev{display:flex; flex-direction:column; align-items:center; gap:16px;}
.land-cap{font-size:13px; letter-spacing:.04em; text-transform:uppercase; color:var(--faint);}

/* ---- landscape tablet ---- */
.tablet-body{
  position:relative; width:720px; height:580px;
  background:#141416; border:1px solid #2A2A2E; border-radius:28px; padding:14px;
  box-shadow:0 0 0 2px #000, 0 40px 90px -25px rgba(0,0,0,.75), 0 12px 30px -12px rgba(0,0,0,.5);
}
.tablet-body::before{ /* camera */
  content:""; position:absolute; top:50%; left:7px; transform:translateY(-50%);
  width:6px; height:6px; border-radius:50%; background:#3a3a3f;
}
.tablet-screen{
  width:100%; height:100%; background:#fff; border-radius:14px; overflow:hidden;
}
.scroller{width:100%; height:100%; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;}
.scroller::-webkit-scrollbar{width:0;height:0;}
.scroller img{width:100%; display:block;}

/* ---- phone ---- */
.phone-body{
  position:relative; width:286px; height:580px;
  background:#141416; border:1px solid #2A2A2E; border-radius:40px; padding:11px;
  box-shadow:0 0 0 2px #000, 0 40px 90px -25px rgba(0,0,0,.75), 0 12px 30px -12px rgba(0,0,0,.5);
}
.phone-body::before{ /* dynamic island */
  content:""; position:absolute; top:20px; left:50%; transform:translateX(-50%);
  width:82px; height:20px; border-radius:12px; background:#000; z-index:2;
}
.phone-screen{width:100%; height:100%; background:#fff; border-radius:30px; overflow:hidden;}

.land-hint{margin-top:2px; font-size:12.5px; color:var(--faint); text-align:center;}

/* mid widths: scale the pair down together instead of wrapping */
@media (max-width:1040px){ .land-devices{gap:32px;} }
@media (max-width:940px){ .land-devices{transform:scale(.9);transform-origin:top center;} }
@media (max-width:840px){ .land-devices{transform:scale(.8);} }
@media (max-width:760px){
  .land-devices{flex-direction:column; flex-wrap:wrap; gap:40px; transform:none;}
  .tablet-body{width:92vw; height:69vw; padding:2.2vw; border-radius:4vw;}
  .tablet-screen{border-radius:2.4vw;}
}
</style>
</head>
